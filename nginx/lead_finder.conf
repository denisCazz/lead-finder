# /etc/nginx/sites-available/lead_finder
# Symlink: ln -s /etc/nginx/sites-available/lead_finder /etc/nginx/sites-enabled/
#
# Usare SOLO se Nginx è il reverse proxy davanti a Docker.
# Se il SSL è gestito da Coolify/Traefik, questo file NON serve.
# In quel caso Docker espone direttamente la porta 80:3000.

server {
    listen 80;
    listen [::]:80;
    server_name ar0a48ifytfmtgqljukjztap.212.227.193.249.sslip.io;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy to Next.js container
    location / {
        proxy_pass http://127.0.0.1:3000;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts (scraping/AI calls can be slow)
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
    }

    # Cache static assets
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Max upload size (for CSV imports)
    client_max_body_size 10M;
}
